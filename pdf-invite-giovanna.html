    <style>
        :root {
            --pink-light: #fce4ec;
            --pink-main: #f06292;
            --gold: #d4af37;
            --purple: #ba68c8;
        }

        /* body mínimo — o flex fica só no wrapper (evita estilizar o body real da página admin no PDF). */
        body {
            margin: 0;
        }

        .invite-pdf-root {
            box-sizing: border-box;
            width: 100%;
            max-width: 540px;
            margin: 0;
            padding: 20px;
            background-color: #fff5f8;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, #fff5f8 0%, #ffe0f0 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            border: 8px solid #fff5f8;
            box-sizing: border-box;
            text-align: center;
            padding-bottom: 30px;
        }

        /* Estrelas e brilhos de fundo (atrás do conteúdo) */
        .invite-bg-stars {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .invite-bg-stars span {
            position: absolute;
            color: rgba(255, 255, 255, 0.65);
            font-size: 11px;
            line-height: 1;
            text-shadow: 0 0 6px rgba(255, 182, 193, 0.85);
            font-family: system-ui, sans-serif;
        }

        .invite-bg-stars .star-lg {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
        }

        .invite-bg-stars .star-gold {
            color: rgba(200, 165, 50, 0.72);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .invite-bg-stars .star-xs {
            font-size: 8px;
            opacity: 0.85;
        }

        .invite-bg-stars .star-md {
            font-size: 13px;
        }

        .photo-container {
            margin-top: 40px;
            position: relative;
            z-index: 2;
        }

        .photo-container img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            object-fit: cover;
        }

        .unicorn-img {
            width: 180px;
            margin: 20px auto;
            display: block;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--pink-main);
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #888;
            text-transform: uppercase;
            font-weight: 600;
            position: relative;
            z-index: 2;
        }

        .venue-line {
            font-size: 0.95rem;
            color: var(--purple);
            font-weight: 600;
            margin: 8px 20px 0;
            position: relative;
            z-index: 2;
        }

        .info-section {
            background: rgba(255, 255, 255, 0.6);
            margin: 20px 30px;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--pink-main);
            position: relative;
            z-index: 2;
        }

        .date {
            font-size: 1.5rem;
            color: #444;
            margin-bottom: 10px;
        }

        .address {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }

        .pdf-links {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px 20px;
        }

        .map-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--pink-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            font-family: 'Montserrat', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
        }

        /* Emoji renderiza de forma consistente no PDF (html2canvas costuma falhar com SVG pequeno). */
        .map-link__icon {
            font-size: 1.85rem;
            line-height: 1;
            flex-shrink: 0;
            display: inline-block;
        }

        .map-link--icon-only {
            min-width: 48px;
            min-height: 48px;
            padding: 8px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(240, 98, 146, 0.35);
        }

        @media print {
            .invite-pdf-root { background: #fff5f8; padding: 12px; }
            .card { box-shadow: none; border-color: #fff5f8; }
        }
    </style>
</head>
