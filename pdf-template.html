<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template PDF - Convite de Casamento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            padding: 20px;
            color: #2c2c2c;
            margin: 0;
        }

        /* ===== PDF CONTAINER (A4 proporção) ===== */
        .pdf-container {
            width: 800px;
            height: 1131px;
            margin: 0 auto;
            background: #ffffff;
            position: relative;
            overflow: visible;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 60px 20px 60px;
        }

        /* ===== DECORAÇÕES FLORAIS COM IMAGENS ===== */
        .floral-decoration {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        .floral-decoration img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Flores horizontais no topo e rodapé */
        .floral-top {
            top: 195px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 600px;
            height: auto;
            max-height: 150px;
        }

        .floral-bottom {
            bottom: 205px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: auto;
            max-height: 150px;
        }

        /* Flores nos cantos */
        .floral-corner {
            width: 120px;
            height: 120px;
            opacity: 0.25;
        }

        .floral-corner-top-left {
            top: 20px;
            left: 20px;
            transform: rotate(90deg);
        }

        .floral-corner-top-right {
            top: 20px;
            right: 20px;
        }

        .floral-corner-bottom-left {
            bottom: 20px;
            left: 20px;
            transform: rotate(180deg);
        }

        .floral-corner-bottom-right {
            bottom: 20px;
            right: 20px;
            transform: rotate(-90deg);
        }


        /* Flores internas decorativas */
        .floral-inner {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        .floral-inner img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .floral-inner-top-left {
            top: 80px;
            left: 30px;
            width: 100px;
            height: 100px;
            transform: rotate(45deg);
        }

        .floral-inner-top-right {
            top: 80px;
            right: 30px;
            width: 100px;
            height: 100px;
            transform: rotate(-45deg);
        }

        .floral-inner-bottom-left {
            bottom: 200px;
            left: 30px;
            width: 100px;
            height: 100px;
            transform: rotate(135deg);
        }

        .floral-inner-bottom-right {
            bottom: 200px;
            right: 30px;
            width: 100px;
            height: 100px;
            transform: rotate(-135deg);
        }

        /* ===== CONTEÚDO ===== */
        .content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            border: 1px solid rgba(139,111,71,0.1);
            padding: 30px 40px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .names-section {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 0;
            padding-top: 50px;
        }

        .couple-names {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            color: #d4a574;
            line-height: 1.1;
        }

        .connector {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #d4a574;
            margin: 10px 0;
        }

        .intro-text {
            font-size: 1.1rem;
            color: #8b6f47;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* ===== IMAGEM DO CASAL ===== */
        .couple-image-wrapper {
            width: 200px;
            height: 200px;
            margin: 20px auto 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #d4a574;
            box-shadow: 0 4px 15px rgba(139, 111, 71, 0.3);
            position: relative;
        }

        .couple-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(1.05) contrast(1.1) saturate(1.1);
        }

        .couple-image-wrapper::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.3) 0%, rgba(139, 111, 71, 0.2) 100%);
            z-index: -1;
        }

        /* ===== DATA SECTION (LAYOUT IGUAL AO EXEMPLO) ===== */
        .date-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 10px;
            width: 100%;
        }

        .date-side {
            flex: 1;
            border-top: 1px solid #d4a574;
            border-bottom: 1px solid #d4a574;
            padding: 15px 0;
            font-size: 1.2rem;
            color: #8b6f47;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .date-center {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            color: #d4a574;
            font-weight: 700;
            line-height: 1;
        }

        .month-text {
            font-size: 1.5rem;
            color: #8b6f47;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        /* ===== ÍCONES INTERATIVOS ===== */
        .icons-section {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 20px;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            width: 30%;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #d4a574;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #d4a574;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .icon-item:hover .icon-circle {
            background: #d4a574;
            color: #fff;
        }

        .icon-label {
            font-size: 0.8rem;
            color: #8b6f47;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            text-align: center;
        }

        .click-hint {
            margin-top: 15px;
            margin-bottom: 0;
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Remover emojis do hint */
        .click-hint::before {
            content: "→ ";
        }

        @media print {
            body { padding: 0; background: #fff; }
            .pdf-container { box-shadow: none; border: none; }
        }
    </style>
</head>

<body>
    <div class="pdf-container" id="convite">
        <!-- Decorações Florais Externas -->
        <div class="floral-decoration floral-top">
            <img src="images/flortop.png" alt="Flores decorativas">
        </div>
        <div class="floral-decoration floral-bottom">
            <img src="images/florbaixo.png" alt="Flores decorativas">
        </div>
        
        <div class="content">
            <div class="names-section">
                <h1 class="couple-names">Erli</h1>
                <div class="connector">e</div>
                <h1 class="couple-names">Francisco</h1>
            </div>

            <div class="couple-image-wrapper">
                <img src="images/casal.jpg" alt="Erli e Francisco" class="couple-image">
            </div>

            <p class="intro-text">Convidam carinhosamente para seu casamento</p>

            <div class="date-container">
                <div class="date-side">Sábado</div>
                <div class="date-center">28</div>
                <div class="date-side">às 11h</div>
            </div>
            <p class="month-text">Fevereiro</p>

            <div class="icons-section">
                <a href="https://www.google.com/maps/search/?api=1&query=Rua+Maria+Sieglinde+24,+Vila+Hulda+-+Centro+de+Guarulhos" class="icon-item" target="_blank">
                    <div class="icon-circle">📍</div>
                    <div class="icon-label">Cerimônia e<br>Recepção</div>
                </a>

                <a href="https://erlifrancisco.netlify.app/" class="icon-item" target="_blank">
                    <div class="icon-circle">💕</div>
                    <div class="icon-label">Confirme sua<br>Presença</div>
                </a>

                <a href="download-gift-list.html" class="icon-item" target="_blank">
                    <div class="icon-circle">🎁</div>
                    <div class="icon-label">Lista de<br>Presentes</div>
                </a>
            </div>

            <p class="click-hint">Clique nos ícones para acessar</p>
        </div>
    </div>
</body>
</html>
